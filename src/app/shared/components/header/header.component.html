<header class="header">
  <div class="header-left">
    <button class="menu-toggle" mat-icon-button (click)="toggleSidebar.emit()">
      <mat-icon>menu</mat-icon>
    </button>

    <div class="header-info">
      @if (breadcrumbs().length > 0) {
        <div class="breadcrumbs">
          @for (crumb of breadcrumbs(); track crumb; let last = $last) {
            <span class="crumb">{{ crumb }}</span>
            @if (!last) {
              <mat-icon class="crumb-arrow">chevron_right</mat-icon>
            }
          }
        </div>
      }
      <div class="header-title-row">
        <h1 class="header-title">{{ title() }}</h1>
        @if (subtitle()) {
          <span class="header-subtitle">· {{ subtitle() }}</span>
        }
      </div>
    </div>
  </div>

  <div class="header-right">
    <button
      class="theme-toggle"
      mat-icon-button
      [matTooltip]="isDark() ? 'Modo claro' : 'Modo oscuro'"
      (click)="toggleTheme.emit()"
    >
      <mat-icon>{{ isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <button class="notif-btn" mat-icon-button>
      <mat-icon>notifications_none</mat-icon>
      <span class="notif-dot"></span>
    </button>

    <span class="header-divider"></span>

    <div class="user-area">
      <div class="user-avatar">{{ userInitials() }}</div>
      <div class="user-info">
        <span class="user-name">{{ userName() }}</span>
        <span class="user-role">{{ userRole() }}</span>
      </div>
      <button class="logout-btn" mat-icon-button (click)="logout.emit()" matTooltip="Cerrar sesion">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </div>
</header>
