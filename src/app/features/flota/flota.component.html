<div class="flota">
  <div class="stats-row">
    <button class="card stat-card" [class.active]="filter() === ''" (click)="setFilter('')">
      <span class="stat-label">Flota total</span>
      <span class="stat-value mono">{{ stats().total }} <small>buses</small></span>
    </button>
    <button class="card stat-card" [class.active]="filter() === 'operativo'" (click)="setFilter('operativo')">
      <span class="stat-label">En operacion</span>
      <span class="stat-value mono" style="color:var(--ok-600)">{{ stats().operativo }} <small>buses</small></span>
    </button>
    <button class="card stat-card" [class.active]="filter() === 'mantenimiento'" (click)="setFilter('mantenimiento')">
      <span class="stat-label">Mantenimiento</span>
      <span class="stat-value mono" style="color:var(--err-600)">{{ stats().mantenimiento }} <small>buses</small></span>
    </button>
    <button class="card stat-card" [class.active]="filter() === 'garaje'" (click)="setFilter('garaje')">
      <span class="stat-label">En garaje</span>
      <span class="stat-value mono" style="color:var(--ink-500)">{{ stats().garaje }} <small>buses</small></span>
    </button>
  </div>

  <div class="card table-card">
    <div class="table-header">
      <span class="muted">{{ filtered().length }} buses</span>
      <button class="btn btn-accent btn-sm" (click)="abrirModal()"><mat-icon>add</mat-icon> Registrar bus</button>
    </div>
    <table class="tbl">
      <thead><tr><th>Placa</th><th>Marca & Modelo</th><th>Ano</th><th>Carriles</th><th>Estado</th></tr></thead>
      <tbody>
        @for (b of filtered(); track b.id) {
          <tr>
            <td><span class="mono fw600">{{ b.placa }}</span></td>
            <td>{{ b.marca }} {{ b.modelo }}</td>
            <td>{{ b.anio }}</td>
            <td><span class="mono">{{ b.numeroCarriles }}</span></td>
            <td><app-status-badge [label]="getEstadoInfo(b.estadoMecanico).label" [variant]="getEstadoInfo(b.estadoMecanico).variant" /></td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
